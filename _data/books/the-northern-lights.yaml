- text: "“From the other universe we can see through the Aurora.”
Lyra turned around again. Her father was lying back in his chair, lazy and
powerful, his eyes as fierce as his dæmon’s. She didn’t love him, she
couldn’t trust him, but she had to admire him, and the extravagant luxury
he’d assembled in this desolate wasteland, and the power of his ambition."
  page: "Page 376"

- text: "“And I’m going to that world beyond the Aurora,” he said, “because I think
that’s where all the Dust in this universe comes from. You saw those slides
I showed the Scholars in the retiring room. You saw Dust pouring into this
world from the Aurora. You’ve seen that city yourself. If light can cross the
barrier between the universes, if Dust can, if we can see that city, then we
can build a bridge and cross. It needs a phenomenal burst of energy. But I
can do it. Somewhere out there is the origin of all the Dust, all the death,
the sin, the misery, the destructiveness in the world. Human beings can’t
see anything without wanting to destroy it, Lyra. That’s original sin. And
I’m going to destroy it. Death is going to die.”

“Is that why they put you here?”

“Yes. They are terrified. And with good reason.”

He stood up, and so did his dæmon, proud and beautiful and deadly. Lyra
sat still. She was afraid of her father, and she admired him profoundly, and
she thought he was stark mad; but who was she to judge?"
  page: "Page 377"

- text: "The moon had set by now, and the sky to the south was profoundly dark,
though the billions of stars lay on it like diamonds on velvet. They were
outshone, though, by the Aurora, outshone a hundred times. Never had
Lyra seen it so brilliant and dramatic; with every twitch and shiver, new
miracles of light danced across the sky. And behind the ever-changing
gauze of light, that other world, that sunlit city, was clear and solid."
  page: "Page 390"

- text: "She turned away. Behind them lay pain and death and fear; ahead of them
lay doubt, and danger, and fathomless mysteries. But they weren’t alone.
So Lyra and her dæmon turned away from the world they were born in,
and looked toward the sun, and walked into the sky."
  page: "Page 399"