- text: "Into this wild abyss,

The womb of nature and perhaps her grave,

Of neither sea, nor shore, nor air, nor fire,

But all these in their pregnant causes mixed

Confusedly, and which thus must ever fight,

Unless the almighty maker them ordain

His dark materials to create more worlds,

Into this wild abyss the wary fiend

Stood on the brink of hell and looked a while,

Pondering his voyage..."
  page: "Preface"

- text: "“Ah, it’s not our field, Charles. As I understand it, the Holy Church teaches that there are two worlds: the world of everything we can see and hear
and touch, and another world, the spiritual world of heaven and hell. Barnard and Stokes were two—how shall I put it—renegade theologians
who postulated the existence of numerous other worlds like this one, neither heaven nor hell, but material and sinful. They are there, close by, but invisible and unreachable. The Holy Church naturally disapproved of this abominable heresy, and Barnard and Stokes were silenced."
  page: "Page 31"

- text: "“That’s the duty of the old,” said the Librarian, “to be anxious on behalf of
the young. And the duty of the young is to scorn the anxiety of the old.”
They sat for a while longer, and then parted, for it was late, and they were
old and anxious."
  page: "Page 33"

- text: "Before he could finish, there came a soft urgent knock on the door. She
could feel his hands give an involuntary tremor.
“Quick now, child,” he said quietly. “The powers of this world are very
strong. Men and women are moved by tides much fiercer than you can
imagine, and they sweep us all up into the current. Go well, Lyra; bless
you, child, bless you. Keep your own counsel.”"
  page: "Page 74"

- text: "There was no point in asking what that meant. It lay heavily in her hands,
the crystal face gleaming, the golden body exquisitely machined. It was
very like a clock, or a compass, for there were hands pointing to places
around the dial, but instead of the hours or the points of the compass there
were several little pictures, each of them painted with extraordinary
precision, as if on ivory with the finest and slenderest sable brush. She
turned the dial around to look at them all. There was an anchor; an
hourglass surmounted by a skull; a chameleon, a bull, a beehive...Thirty-
six altogether, and she couldn’t even guess what they meant.

“There’s a wheel, look,” said Pantalaimon. “See if you can wind it up.”
There were three little knurled winding wheels, in fact, and each of them
turned one of the three shorter hands, which moved around the dial in a
series of smooth satisfying clicks. You could arrange them to point at any
of the pictures, and once they had clicked into position, pointing exactly at
the center of each one, they would not move.

The fourth hand was longer and more slender, and seemed to be made of a
duller metal than the other three. Lyra couldn’t control its movement at
all; it swung where it wanted to, like a compass needle, except that it
didn’t settle."
  page: "Page 79"

- text: "You ever heard of the Nälkäinens?”

Lyra said, “No. Not even with Mrs. Coulter. What are they?”
“That’s a kind of ghost they have up there in those forests. Same size as a
child, and they got no heads. They feel their way about at night and if
you’re a sleeping out in the forest they get ahold of you and won’t nothing
make ’em let go. Nälkäinens, that’s a northern word. And the Windsuckers,
they’re dangerous too. They drift about in the air. You come across clumps
of ’em floated together sometimes, or caught snagged on a bramble. As
soon as they touch you, all the strength goes out of you. You can’t see ’em
except as a kind of shimmer in the air. And the Breathless Ones...”

“Who are they?”

“Warriors half-killed. Being alive is one thing, and being dead’s another,
but being half-killed is worse than either. They just can’t die, and living is
altogether beyond ’em. They wander about forever. They’re called the
Breathless Ones because of what’s been done to ’em.”

“And what’s that?” said Lyra, wide-eyed.

“The North Tartars snap open their ribs and pull out their lungs. There’s an
art to it. They do it without killing ’em, but their lungs can’t work anymore
without their dæmons pumping ’em by hand, so the result is they’re
halfway between breath and no breath, life and death, half-killed, you see.
And their dæmons got to pump and pump all day and night, or else perish
with ’em. You come across a whole platoon of Breathless Ones in the forest
sometimes, I’ve heard. And then there’s the panserbjørne—you heard of
them? That means armored bears."
  page: "Page 108"

- text: "She took the mug into the cabin, where Farder Coram had found a beer
glass. He held the tin mug upside down over it and then slipped the card
out from between them, so that the creature fell into the glass. He held it
up so they could see the angry little thing clearly.

It was about as long as Lyra’s thumb, and dark green, not black. Its wing
cases were erect, like a ladybird’s about to fly, and the wings inside were
beating so furiously that they were only a blur. Its six clawed legs were
scrabbling on the smooth glass.

“What is it?” she said.

Pantalaimon, a wildcat still, crouched on the table six inches away, his
green eyes following it round and round inside the glass.

“If you was to crack it open,” said Farder Coram, “you’d find no living
thing in there. No animal nor insect, at any rate. I seen one of these things
afore, and I never thought I’d see one again this far north. Afric things.
There’s a clockwork running in there, and pinned to the spring of it, there’s
a bad spirit with a spell through its heart”...

After a tricky moment when one of the creature’s legs escaped and thrust
the tin away with surprising strength, they had it captured and the lid
screwed down tight.

“As soon’s we get about the ship I’ll run some solder round the edge to
make sure of it,” Farder Coram said.

“But don’t clockwork run down?”

“Ordinary clockwork, yes. But like I said, this un’s kept tight wound by the
spirit pinned to the end. The more he struggles, the tighter it’s wound, and
the stronger the force is. Now let’s put this feller out the way...”"
  page: "Page 155"

- text: "“They are said to originate in the city of Prague,” said the consul. “The
Scholar who invented the first alethiometer was apparently trying to
discover a way of measuring the influences of the planets, according to the
ideas of astrology. He intended to make a device that would respond to the
idea of Mars or Venus as a compass responds to the idea of North. In that
he failed, but the mechanism he invented was clearly responding to
something, even if no one knew what it was.”

“And where did they get the symbols from?”

“Oh, this was in the seventeenth century. Symbols and emblems were
everywhere. Buildings and pictures were designed to be read like books.
Everything stood for something else; if you had the right dictionary, you
could read Nature itself. It was hardly surprising to find philosophers using
the symbolism of their time to interpret knowledge that came from a
mysterious source. But, you know, they haven’t been used seriously for
two centuries or so.”" 
  page: "Page 173"

- text: "“By not being human,” he said. “That’s why you could never trick a bear.
We see tricks and deceit as plain as arms and legs. We can see in a way
humans have forgotten. But you know about this; you can understand the
