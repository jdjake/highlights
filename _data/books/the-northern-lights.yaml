- text: "“Mr. Scoresby, you know the Tartars make holes in people’s heads?”
“Oh, sure. They’ve been doing that for thousands of years. In the Tunguska
campaign we captured five Tartars alive, and three of them had holes in
their skulls. One of them had two.”

“They do it to each other?”

“That’s right. First they cut partway around a circle of skin on the scalp, so
they can lift up a flap and expose the bone. Then they cut a little circle of
bone out of the skull, very carefully so they don’t penetrate the brain, and
then they sew the scalp back over.”

“I thought they did it to their enemies!”

“Hell, no. It’s a great privilege. They do it so the gods can talk to them.”"
  page: "Page 229"

- text: "“Why en’t you cold, Serafina Pekkala?”

“We feel cold, but we don’t mind it, because we will not come to harm.
And if we wrapped up against the cold, we wouldn’t feel other things, like
the bright tingle of the stars, or the music of the Aurora, or best of all the
silky feeling of moonlight on our skin. It’s worth being cold for that.”

“Could I feel them?”

“No. You would die if you took your furs off. Stay wrapped up.”

“How long do witches live, Serafina Pekkala? Farder Coram says hundreds
of years. But you don’t look old at all.”

“I am three hundred years or more. Our oldest witch mother is nearly a
thousand. One day, Yambe-Akka will come for her. One day she’ll come
for me. She is the goddess of the dead. She comes to you smiling and
kindly, and you know it is time to die.”

“Are there men witches? Or only women?”

“There are men who serve us, like the consul at Trollesund. And there are
men we take for lovers or husbands. You are so young, Lyra, too young to
understand this, but I shall tell you anyway and you’ll understand it later:
men pass in front of our eyes like butterflies, creatures of a brief season.
We love them; they are brave, proud, beautiful, clever; and they die almost
at once. They die so soon that our hearts are continually racked with pain.
We bear their children, who are witches if they are female, human if not;
and then in the blink of an eye they are gone, felled, slain, lost. Our sons,
too. When a little boy is growing, he thinks he is immortal. His mother
knows he isn’t. Each time becomes more painful, until finally your heart is
broken. Perhaps that is when Yambe-Akka comes for you. She is older than
the tundra. Perhaps, for her, witches’ lives are as brief as men’s are to us.”"
  page: "Page 313"

- text: "Because Iorek was moving backward only to find clean dry footing and a
firm rock to leap up from, and the useless left arm was really fresh and
strong. You could not trick a bear, but, as Lyra had shown him, Iofur did
not want to be a bear, he wanted to be a man; and Iorek was tricking him.
At last he found what he wanted: a firm rock deep-anchored in the
permafrost. He backed against it, tensing his legs and choosing his
moment.
It came when Iofur reared high above, bellowing his triumph, and turning
his head tauntingly toward Iorek’s apparently weak left side.

That was when Iorek moved. Like a wave that has been building its
strength over a thousand miles of ocean, and which makes little stir in the
deep water, but which when it reaches the shallows rears itself up high
into the sky, terrifying the shore dwellers, before crashing down on the
land with irresistible power—so Iorek Byrnison rose up against Iofur,
exploding upward from his firm footing on the dry rock and slashing with
a ferocious left hand at the exposed jaw of Iofur Raknison.

It was a horrifying blow. It tore the lower part of his jaw clean off, so that
it flew through the air scattering blood drops in the snow many yards
away.

Iofur’s red tongue lolled down, dripping over his open throat. The bear-
king was suddenly voiceless, biteless, helpless. Iorek needed nothing more.
He lunged, and then his teeth were in Iofur’s throat, and he shook and
shook this way, that way, lifting the huge body off the ground and
battering it down as if Iofur were no more than a seal at the water’s edge.
Then he ripped upward, and Iofur Raknison’s life came away in his teeth.
There was one ritual yet to perform. Iorek sliced open the dead king’s
unprotected chest, peeling the fur back to expose the narrow white and red
ribs like the timbers of an upturned boat. Into the rib cage Iorek reached,
and he plucked out Iofur’s heart, red and steaming, and ate it there in front
of Iofur’s subjects."
  page: "Page 353"

