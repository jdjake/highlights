- text: "Brock scanned face after face, registering stigmata, a parade of receding foreheads, theromorphic ears, and alarmingly sloped Frankfurt Horizontals. He was a devotee of the thinking of pioneer criminologist Cesare Lombroso (1836–1909), who’d believed that the brains of criminals were short on lobes that controlled civilized values like morality and respect for the law, tending indeed to resemble animal more than human brains, and thus caused the crania that housed them to develop differently, which included the way their faces would turn out looking. Abnormally large eye sockets, prognathism, frontal submicrocephaly, Darwinian Tipped Ear, you name it, Lombroso had a list that went on, and skull data to back him up. By Brock’s time the theory had lapsed into a quaint, undeniably racist spinoff from nineteenth-century phrenology, crude in method and long superseded, although it seemed reasonable to Brock. What really got his attention was the Lombrosian concept of “misoneism.” Radicals, militants, revolutionaries, however they styled themselves, all sinned against this deep organic human principle, which Lombroso had named after the Greek for “hatred of anything new.” It operated as a feedback device to keep societies coming along safely, coherently. Any sudden attempt to change things would be answered by an immediate misoneistic backlash, not only from the State but from the people themselves—Nixon’s election in ’68 seeming to Brock a perfect example of this."
  page: "Page 272"

- text: "Well, what a life, you’d ordinarily say. But Brock coveted more. He’d caught a fatal glimpse of that level where everybody knew everybody else, where however political fortunes below might bloom and die, the same people, the Real Ones, remained year in and year out, keeping what was desirable flowing their way. Prosecutor Vond wanted a life there, only slowly coming to understand that for someone of his background there would be no route to this but self-abasement, fawning, gofering, scrambling for tips and offering other such hints of his eagerness to be brevetted on life’s battlefield to a rank higher than he would ever, by the terms of his enlistment, have deserved. Though his defects of character were many, none was quite as annoying as this naked itch to be a gentleman, kept inflamed by a stubborn denial of what everyone else knew—that no matter how much money he made, how many political offices or course credits from charm school might come his way, no one of those among whom he wished to belong would ever regard him as other than a thug whose services had been hired.

But Brock didn’t feel like any thug or, more important, look like one either. Whenever he shaved, the humming small life solid in his hand, what he saw was Lombrosian evidence of a career plausibly honest enough to sell his ideas, his beliefs, to anybody, at any level."
  page: "Page 275"

- text: "Taken down, she understood, from all the silver and light she’d known and been, brought back to the world like silver recalled grain by grain from the Invisible to form images of what then went on to grow old, go away, get broken or contaminated. She had been privileged to live outside of Time, to enter and leave at will, looting and manipulating, weightless, invisible. Now Time had claimed her again, put her under house arrest, taken her passport away. Only an animal with a full set of pain receptors after all."
