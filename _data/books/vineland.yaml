- text: "Frenesi had ridden into his life like a whole gang of outlaws. He felt like a schoolmarm. He was working gypsy construction jobs by day and playing at night with the Corvairs, never anyplace near the surf but inland, for this sun-beat farm country had always welcomed them, beer riders of the valleys having found strange affinities with surfers and their music. Besides a common interest in beer, members of both subcultures, whether up on a board or behind a 409, shared the terrors and ecstasies of the passive, taken rider, as if a car engine held encapsulated something likewise oceanic and mighty—a technowave, belonging to distant others as surf belonged to the sea, bought into by the riders strictly as-is, on the other party’s terms. Surfers rode God’s ocean, beer riders rode the momentum through the years of the auto industry’s will. That death entered into their recreation more than into the surfers’ helped shape an attitude, nonetheless, that had brought the Corvairs their share of toilet and parking-lot trauma, police interventions, sudden midnight farewells.

The band played up and down valleys still in those days unknown except to a few real-estate visionaries, little crossroads places where one day houses’d sprawl and the rates of human affliction in all categories zoom. After work, unable to sleep, the Corvairs liked to go out and play motorhead valley roulette in the tule fogs. These white presences, full of blindness and sudden highway death, moved, as if conscious, unpredictably over the landscape. There were few satellite photos back then, so people had only the ground-level view. No clear bounded shape—all at once, there in the road, a critter in a movie, too quick to be true, there it’d be. The idea was to enter the pale wall at a speed meaningfully over the limit, to bet that the white passage held no other vehicles, no curves, no construction, only smooth, level, empty roadway to an indefinite distance—a motorhead variation on a surfer’s dream.

Zoyd had grown up in the San Joaquin, ridden with the Bud Warriors and later the Ambassadors, gone on many an immortally lunatic “grudge run,” as Dick Dale might say, through the presuburban citrus groves and pepper fields, lost a high percentage of his classmates, blank rectangles in the yearbooks, to drunk driving or failed machinery, and would eventually return to the same sunny, often he could swear haunted, landscape to get married, one afternoon on a smooth gold green California hillside, with oak in darker patches, a freeway in the distance, dogs and children playing and running, and the sky, for many of the guests, awriggle with patterns of many colors, some indescribable.

“Frenesi Margaret, Zoyd Herbert, will you, for real, in trouble or in trippiness, promise to remain always on the groovy high known as Love,” and so forth, it may have taken hours or been over in half a minute, there were few if any timepieces among those assembled, and nobody seemed restless, this after all being the Mellow Sixties, a slower-moving time, predigital, not yet so cut into pieces, not even by television. It would be easy to remember the day as a soft-focus shot, the kind to be seen on “sensitivity” greeting cards in another few years. Everything in nature, every living being on the hillside that day, strange as it sounded later whenever Zoyd tried to tell about it, was gentle, at peace—the visible world was a sunlit sheep farm. War in Vietnam, murder as an instrument of American politics, black neighborhoods torched to ashes and death, all must have been off on some other planet."
  page: "Page 38"

- text: "Mean or not, he hadn’t cried about it for a long time. The years had kept rolling, like the surf he used to ride, high, calm, wild, windless. But increasingly the day, the necessary day, presenting its demands, had claimed him, till there was only one small bitter amusement he refused to let go of. Now and then, when moon, tides, and planetary magnetism were all in tune, he went venturing out, straight up through the third eye in his forehead, into an extraordinary system of transport whereby he could go gliding right to wherever she was, and incompletely unseen, sensed just enough to be troublesome, he then would haunt her, for as long as he could, enjoying every squeezed-out minute. A vice, for sure, and one he had confessed only to a handful of people, including, it may have turned out unwisely, their daughter, Prairie, this very morning."
  page: "Page 39"

- text: "“Educated pussy,” Zoyd sighed, “don’t know why, f’ some reason I must’ve been a easy mark. She was a filmmaker, went to Berkeley, I was working on people’s gutters, she rilly freaked when she found out she was pregnant.”"
  page: "Page 41"

- text: "It was a long time ago, old as Prairie, who for a while had been a topic of debate. Frenesi was getting free advice both ways. Some told her it was the end of her life as an artist, as a revolutionary, and urged her to get an abortion, not that easy to come by in those days unless you drove south of the border. If you wanted to stay north of it you had to be rich and go through a committee exercise with gynecologists and shrinks. Others pointed out to her what a groovy chance this would be to bring up a child in a politically correct way, though definitions of this varied from reading Trotsky to her at bedtime to including LSD in the formula."
  page: "Page 42"

- text: "Crawfish business done, Zoyd’s next stop was out to the Old Thumb peninsula to Rick & Chick’s Born Again, an auto-conversion shop located among log piles and county motor pools. The owners, Humboldt County twins, had found Jesus and their seed money at about the same time, during the fuel panic of the seventies, when, to get a tax break for bringing out the first U.S. passenger diesel, GM took its 5.7-liter V-8 Cadillac engine and, in some haste, converted it. In the season of purchaser disenchantment that followed, engine experts, including Rick and Chick, found they could make on the order of $2,500 per job reconverting these ill-considered mills from diesel back to gasoline again. Soon they’d expanded into bodywork, put in a paint shed, and begun doing more customizing and conversion, eventually becoming a byword up and down the Coast and beyond the Sierras of the automotive second chance."
  page: "Page 44"

- text: "“Armed personnel carriers,” Trent trying to scream and keep his voice down at the same time, “persons in full battle gear stomping through vegetable patches, somebody said they shot Stokely’s dog, I’m in here with a thirty-aught-six I don’t even know how to load, Zoyd, what’s gooeen ahn?”

“Wait, easy pardner, now it sounds like CAMP,” meaning the infamous federal-state Campaign Against Marijuana Production, “but it ain’t quite the season yet.”

“It’s you, fucker,” Trent blubbering now, “they’re usin’ your place for a headquarters, everything’s thrown out in the yard, they sure must’ve found your stash by now. . . .”

“Do they know what I’m driving?”

“Not from me.”

“Thanks Trent. Don’t know when—”

“Don’t say it,” Trent warned, sniffling, “see you whenever,” and hung up.

Zoyd thought his best bet might be to find an RV park someplace and try to blend in. He reserved a space a few miles out of town up Seventh River under a fake name, praying nobody was listening in on this phone. Then, gingerly, proceeded in the cedar-shake eyesore to Bodhi Dharma Pizza, which he could hear tonight before he saw it. All the occupants of the place were chanting, something that, with vibes of trouble to come, he recognized—not the words, which were in Tibetan, but the tune, with its bone-stirring bass, to a powerful and secret spell against invaders and oppressors, heard in particular a bit later in the year at harvest time, when CAMP helicopters gathered in the sky and North California, like other U.S. pot-growing areas, once again rejoined, operationally speaking, the third world."
  page: "Page 48"

- text: "As if their chanting had been recitative for Hector’s aria, everyone now fell silent and attended. He stood beneath a stained-glass window made in the likeness of an eightfold Pizzic Mandala, in full sunlight a dazzling revelation in scarlet and gold, but at the moment dark, only tweaked now and then by headlights out in the street."
  page: "Page 51"

- text: "At first it had seemed like a terrific idea, a perfect break for them both, at a critical time. Sasha had been there too, to see her off on the flight, she and Zoyd handing the half-asleep Prairie back and forth, arms to arms, like a rehearsal of arrangements to come. It was a rare cooperative moment for the in-laws, in their mutual uneasiness, Sasha never having known really what to make of Zoyd, settling instead for a reflex headshake whenever they met, with an embarrassed laugh that seemed to mean, “You are so inappropriate for my daughter that even you must see it and be as amused as I am—we’re adults after all, and we can certainly share a chuckle, can’t we Zoyd.” But they were to find themselves, amazingly, on the same side of the law after all, which meant no custodial battles ever, for as they both came to learn, no judge would waste the time deciding whose rap sheet was more disreputable—if it was a choice between a lifelong Red grandmother and a dope fiend father, Prairie would end up as a ward of the court, and no question, they had to keep her out of that. Like it or not, they would be forced, now and then anyway, to coordinate their lives."
  page: "Page 56"

- text: "Sasha could hear the pleading, close enough to whining to make her careful. This poor sap could too easily settle for any least shadow of pain, seemed to want to suffer every hurtful detail. Dummy. Why waste his time so? He looked old enough to’ve been through it before, but who knew, maybe this was his maiden voyage into the green seas of jealousy. She might have asked him, but her job these days, it seemed, was just to hold her tongue, keep it sharpened and ready but withheld in a sheath of silence."
  page: "Page 58"

- text: "He bounced slowly from one Honolulu bar to another, allowing himself to trust to the hidden structures of night in a city, to a gift he sometimes thought he had for drifting, if not into intersections of high drama and significant fortune, at least away, most of the time, from danger. At some point he found himself back in the toilet of the Cosmic Pineapple, a then-notorious acid-rock club, conferring with a bass player he’d worked with, who told him about the lounge-piano opening at Kahuna Airlines."
  page: "Page 61"

- text: "Each 747 in the Kahuna Airlines fleet had been gutted and refitted as a huge Hawaiian restaurant and bar, full of hanging island vegetation, nightclub chairs and tables instead of airplane seats, even a miniature waterfall. In-flight movies included Hawaii (1966), The Hawaiians (1970), and Gidget Goes Hawaiian (1961), among others. Zoyd was presented with a thick tattered fake book full of Hawaiian tunes, and on the lounge synthesizer, a Japanese make he’d heard of but never played, he found a ukulele option that would provide up to three orchestral sections of eight ukes each."
  page: "Page 62"

- text: "On westbound flights, Zoyd’s job at the keyboard, like that of the hula dancers, flame eaters, cocktail waitresses, and bartenders, was to keep passengers from thinking about what lay in store for them on the Honolulu end, the luggage misconnected and untraceable, the absent bus links to hotels which had already lost everybody’s reservations, the failure of Jack Lord to show up, as promised in the brochure, for photo opportunities. Kahuna’s all but unpredictable scheduling produced arrival times lost in midwatch hours when airport security grew eager to play roles with disagreeable subtexts, harassing the single women, sweating the dopers, abusing the elderly and foreign, staring, needling, trying to get something going. Where were the traditional local cuties with the flower leis, one for each deplaning neck? “For you?” the armed, uniformed gents all broke out into high barks of laughter. “At this hour? What for?”"
  page: "Page 62"

- text: "When the sixties were over, when the hemlines came down and the colors of the clothes went murky and everybody wore makeup that was supposed to look like you had no makeup on, when tatters and patches had had their day and the outlines of the Nixonian Repression were clear enough even for the most gaga of hippie optimists to see, it was then, facing into the deep autumnal wind of what was coming, that she thought, Here, finally—here’s my Woodstock, my golden age of rock and roll, my acid adventures, my Revolution. Come into her own at last, street-legal, full-auto qualified, she understood her particular servitude as the freedom, granted to a few, to act outside warrants and charters, to ignore history and the dead, to imagine no future, no yet-to-be-born, to be able simply to go on defining moments only, purely, by the action that filled them. Here was a world of simplicity and certainty no acidhead, no revolutionary anarchist would ever find, a world based on the one and zero of life and death. Minimal, beautiful. The patterns of lives and deaths..."
  page: "Page 72"

- text: "After a while her thoughts started falling into place. The injustices she had seen in the streets and fields, so many, too many times gone unanswered—she began to see them more directly, not as world history or anything too theoretical, but as humans, usually male, living here on the planet, often well within reach, committing these crimes, major and petty, one by one against other living humans. Maybe we all had to submit to History, she figured, maybe not—but refusing to take shit from some named and specified source—well, it might be a different story."
  page: "Page 80"

- text: "History in this town,” Sasha muttered, “is no more worthy of respect than the average movie script, and it comes about in the same way—soon as there’s one version of a story, suddenly it’s anybody’s pigeon. Parties you never heard of get to come in and change it. Characters and deeds get shifted around, heartfelt language gets pounded flat when it isn’t just removed forever. By now the Hollywood fifties is this way-over-length, multitude-of-hands rewrite—except there’s no sound, of course, nobody talks. It’s a silent movie.”"
  page: "Page 81"

- text: "Long before any friend or enemy had needed to point it out to her, Sasha on her own had arrived at, and been obliged to face, the dismal possibility that all her oppositions, however just and good, to forms of power were really acts of denying that dangerous swoon that came creeping at the edges of her optic lobes every time the troops came marching by, that wetness of attention and perhaps ancestral curse. Just for its political incorrectness alone, Frenesi had at first reacted to Sasha’s theory with anger, then after a while had found it only annoying, and nowadays, with the two of them into their second decade of silence, good only for a sad sniffle."
  page: "Page 83"

- text: "It was there, gazing down a long aisle of frozen food, out past the checkout stands, and into the terminal black glow of the front windows, that she found herself entering a moment of undeniable clairvoyance, rare in her life but recognized. She understood that the Reaganomic ax blades were swinging everywhere, that she and Flash were no longer exempt, might easily be abandoned already to the upper world and any unfinished business in it that might now resume . . . as if they’d been kept safe in some time-free zone all these years but now, at the unreadable whim of something in power, must reenter the clockwork of cause and effect. Someplace there would be a real ax, or something just as painful, Jasonic, blade-to-meat final—but at the distance she, Flash, and Justin had by now been brought to, it would all be done with keys on alphanumeric keyboards that stood for weightless, invisible chains of electronic presence or absence. If patterns of ones and zeros were “like” patterns of human lives and deaths, if everything about an individual could be represented in a computer record by a long string of ones and zeros, then what kind of creature would be represented by a long string of lives and deaths? It would have to be up one level at least—an angel, a minor god, something in a UFO. It would take eight human lives and deaths just to form one character in this being’s name—its complete dossier might take up a considerable piece of the history of the world. We are digits in God’s computer, she not so much thought as hummed to herself to a sort of standard gospel tune, And the only thing we’re good for, to be dead or to be living, is the only thing He sees. What we cry, what we contend for, in our world of toil and blood, it all lies beneath the notice of the hacker we call God."
  page: "Page 90"

- text: "Emerging from a pool the size of a small reservoir in plaid swim trunks from Brooks Brothers, unable even at first glance to be mistaken for any of the white marble statues surrounding it, Ralph Wayvone, Sr., caped himself with a towel stolen not that long ago from the Fairmont, ascended a short flight of steps, and stood looking out over a retaining wall that seemed in the morning fog to mark the edge of a precipice, or of the world. With only a few tree silhouettes, and both the freeways and El Camino Real miraculously silent, for just these moments Ralph Sr., appreciative of peace as anybody, could take another of what he’d come to think of as microvacations on an island of time fragile and precious as any Tahiti or one of them....

Well—they had better be excellent, that’s all Ralph had to say, or rather think, as the fog now began to lift to reveal not the borderlands of the eternal after all, but only quotidian California again, looking no different than it had when he left."
  page: "Page 92"

- text: "One thing you have to know,” Ralph confided to his namesake the day the kid turned eighteen and got his ventunesimo party three years early, at the time a sensible move given the many talents then surfacing in his character for getting into trouble, “before you get too involved, is that we are a wholly-owned subsidiary.”

“What’s that?” inquired Ralph Jr. In olden times the father might have shrugged, turned without further talk, and gone away to enjoy his despair in private. The two Wayvones were down in the wine cellar, and Ralph could have just left him there, among the bottles. Instead he took the trouble to explain that strictly speaking, the family “owned” nothing. They received an annual operating budget from the corporation that owned them, was all.

“Like the royal family in England, you mean?”

“My firstborn son,” Ralph rolling his eyes, “if it helps—please.”

“I’d be like—Prince Charles?”

“Testa puntita, do me a favor.”

But young Wayvone’s anxious face was now smoothed by the sight of a dusty bottle of wine, a 1961 Brunello di Montalcino, put away the year he was born to be drunk this day of transition to adulthood, though his own share of it was to meet the same porcelain fate as the cheaper stuff he went on to drink too much of."
  page: "Page 94"

- text: "Prairie tried bringing her hair forward in long bangs, brushing the rest down in front of her shoulders, the surest way she knew, her eyes now burning so blue through the fringes and shadows, to creep herself out, no matter what time of the day or night, by imagining that what she saw was her mother’s ghost. And that if she looked half a second too long, it would begin to blink while her own eyes stayed open, its lips would start to move, and then speak to her stuff she was sure she’d rather not hear..."
  page: "Page 98"

- text: "From then on she was able to devote herself full time to ninjitsu, including the forbidden steps outside its canons taken—it seemed long ago—by the sensei, through which the original purity of ninja intent had been subverted, made cruel and more worldly, bled of spirit, once eternal techniques now only one-shot and disposable, once greater patterns now only a string of encounters, single and multiple, none with any meaning beyond itself. This was what he felt he had to pass on—not the brave hard-won grace of any warrior, but the cheaper brutality of an assassin. When DL finally tumbled, she brought it to his attention.

“Sure,” he told her, “this is for all the rest of us down here with the insects, the ones who don’t quite get to make warrior, who with two tenths of a second to decide fail to get it right and live with it the rest of our lives—it’s for us drunks, and sneaks, and people who can’t feel enough to kill if they have to . . . this is our equalizer, our edge—all we have to share. Because we have ancestors and descendants too—our generations . . . our traditions.”

“But everybody’s a hero at least once,” she informed him, “maybe your chance hasn’t come up yet.”

“DL-san, you are crazy,” he diagnosed gently, “seeing too many movies, maybe. Those you will be fighting—those you must resist—they are neither samurai nor ninja. They are sarariman, incrementalists, who cannot act boldly and feel only contempt for those who can. . . . Only for what I must teach you have they learned respect.”

He taught her the Chinese Three Ways, Dim Ching, Dim Hsuen, and Dim Mak, with its Nine Fatal Blows, as well as the Tenth and Eleventh, which are never spoken of. She learned how to give people heart attacks without even touching them, how to get them to fall from high places, how through the Clouds of Guilt technique to make them commit seppuku and think it was their idea—plus a grab bag of strategies excluded from the Kumi-Uchi, or official ninja combat system, such as the Enraged Sparrow, the Hidden Foot, the Nosepicking of Death, and the truly unspeakable Gojira no Chimpira."
  page: "Page 126"

- text: "Today, of course, you can pick up a dedicated hand-held Ninja Death Touch calculator in any drugstore, which will track, compute, and project for you quick as a wink, but back then DL had only her memory to rely on and what she’d learned from Inoshiro Sensei, obliged early, she and her brain, to enter a system of eternal repayment humming along with or without her existence. Sensei called it “the art of the dark meridians,” warning her repeatedly about the timing. “Perfect blow to the correct alarm point, but at the wrong time—might as well stay home—watch a Run Run Shaw movie!” She asked if she could visit him. They said no."
  page: "Page 141"

- text: "By the ancient system, it was the hour of the cock, “In more ways than one,” as Takeshi in later years liked to interpolate in comical accents, predictably to DL’s annoyance. A bird usually associated with the dawn, the cock, by the laws of the Death Touch, belonged to early night. By now the chi cycle of the victim would have arrived in the region of his triple warmer, considered wife to the bladder, which was thus endangered. In the Dim Mak method, the Needle Finger DL intended to use could be calibrated to cause a delay of up to a year in the actual moment of death, depending on the force and direction of its application. She could hit Brock Vond now, and months in the future be safely in the middle of a perfect alibi at the moment he dropped dead."
