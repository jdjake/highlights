- text: "She lay on one elbow, unable to stop gazing at Brock, pretending to herself that it made some difference to him whether or not she and Weed were fucking . . . just as she had to pretend that Brock was not “really” what he looked like to everybody else—namely, the worst kind of self-obsessed collegiate dickhead, projected on into adult format—but that someplace, lost, stupefied, needing her intercession, was the “real” Brock, the endearing adolescent who would allow her to lead him stumbling out into light she imagined as sun plus sky, with an 85 filter in, returning him to the man he should have grown into . . . it could’ve been about the only way she knew to use the word love anymore, its trivializing in those days already well begun, its magic fading, the subject of all that rock and roll, the simple resource we once thought would save us. Yet if there was anything left to believe, she must have in the power even of that weightless, daylit commodity of the sixties to redeem even Brock, amiably, stupidly brutal, fascist Brock.

At some point he must have gone drifting off to sleep, and she hadn’t noticed. She watched over him, hers for a while, allowing herself to shudder with, even surrender to, her need for his bodily presence, his beauty, the fear at the base of her spine, the prurient ache in her hands . . . at last, so swept and helpless, she leaned in to whisper to him her heart’s overflow, and saw in the half-light that what she’d thought were closed eyelids had been open all the time. He’d been watching her. She let out a short jolted scream. Brock started laughing."
  page: "Page 216"

- text: "AS a resident of the everyday world, Weed Atman may have had his points, but as a Thanatoid he rated consistently low on most scales, including those that measured dedication and community spirit. Even his first of many interviews with Takeshi and DL, continuing off and on over the years, had been enough to establish a detachment of attitude, a set of barriers neither found they could cross. We are assured by the Bardo Thödol, or Tibetan Book of the Dead, that the soul newly in transition often doesn’t like to admit—indeed will deny quite vehemently—that it’s really dead, having slipped so effortlessly into the new dispensation that it finds no difference between the weirdness of life and the weirdness of death, an enhancing factor in Takeshi’s opinion being television, which with its history of picking away at the topic with doctor shows, war shows, cop shows, murder shows, had trivialized the Big D itself. If mediated lives, he figured, why not mediated deaths?"
