- text: "One mild overcast Saturday nearly a year after Frenesi had moved out, Zoyd and Prairie, returning from a midday stroll down the alley to the Gordita Pier and back, found inside their house who but Hector, posed dramatically in the front room next to the biggest block of pressed marijuana Zoyd had ever seen in his life, too big to have fit through any door yet towering there, mysteriously, a shaggy monolithic slab reaching almost to the ceiling.” ’Scuse me just a second.” Finger to his lips, Zoyd went and put his daughter, who’d nodded out in the salt breezes, down on the bed in the other room, and her bottle and her duck nearby, and came back in eyeballing the oversize brick, getting nervous.

“Let me guess—2001: A Space Odyssey [1968].”

