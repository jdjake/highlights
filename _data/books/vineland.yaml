- text: "Even Sasha found herself looking at Hub a little gaga for what it seemed he’d done, gone out day after day to fire hoses and tear gas, saps, chains, and pieces of cable, hit, arrested, Sasha up all night bailing him out, working when he could, still trying to apprentice as a gaffer, repairing table lamps and toasters on the side, finding jobs at the margin, beyond the official reach of the anti-communist machine, giving and taking kindnesses, off the books, studying under ancient electricians, masters whose hands, especially about the thumbs, had been blitzed and scarred solid from the years of testing line current and ignoring wattage ratings, who’d saved his life many times over by teaching him how to work with one hand in his pocket so he wouldn’t ground himself. “But that was just my problem, according to your mother, I’d always, in some political way that was a bit deep for me, had one hand in my pocket and not out there doing the world’s work, implying o’ course that if I wasn’t greedily counting my spare change over and over, why then I was selfishly enjoying a quiet round of pocket pool, ask your husband what that means, it’s sorta technical . . . it wasn’t her fault she wanted me purer than I was. And then the other life was happening, the work itself . . . it was just when the Brute was first coming in. Jesus, all those amps. All that light. Nobody told me about the scale of it. After a while I couldn’t see that much else. I needed to work with that light. Maybe it was some form of insanity, except that lets me off too easy. Then there was Wade, my ol’ canasta partner and picket-line buddy, fighting shoulder to shoulder all those years, one day he went over, and we stayed friends, and finally you saw what’d it matter who’d be taking those dues off the paycheck, Al Speede’s people, th’ IATSE, whatever. It’d been over for a long time anyway, though we’d had to pretend otherwise, and what was it for, all those sets we lit, those exotic nightclub sets, the hotel rooms with the neon outside, the passenger coaches with the rain against the windows, all of it just shadows, even if it’s on safety stock in some air-conditioned vault that’s still all it is, I let the world slip away, made my shameful peace, joined the IA, retired soon’s I could, sold off my only real fortune—my precious anger—for a lot of got-damn shadows.”"
  page: "Page 290"

- text: "The baby was perfect cover, it made her something else, a mom, that was all, just another mom in the nation of moms, and all she’d ever have to do to be safe was stay inside that particular fate, bring up the kid, grow into some version of Sasha, deal with Zoyd and his footloose band and all the drawbacks there, forget Brock, the siege, Weed Atman’s blood, 24fps and the old sweet community, forget whoever she’d been, shoot inoffensive little home movies now and then, speak the right lines, stay within budget, wrap each day, one by one, before she lost the light. Prairie could be her guaranteed salvation, pretending to be Prairie’s mom the worst lie, the basest betrayal. By the time she began to see that she might, nonetheless, have gone through with it, Brock Vond had reentered the picture, at the head of a small motorcade of unmarked Buicks, forcing her over near Pico and Fairfax, ordering her up against her car, kicking apart her legs and frisking her himself, and before she knew it there they were in another motel room, after a while her visits to Sasha dropped off and when she made them she came in reeking with Vond sweat, Vond semen—couldn’t Sasha smell what was going on?—and his erect penis had become the joystick with which, hurtling into the future, she would keep trying to steer among the hazards and obstacles, the swooping monsters and alien projectiles of each game she would come, year by year, to stand before, once again out long after curfew, calls home forgotten, supply of coins dwindling, leaning over the bright display among the back aisles of a forbidden arcade, rows of other players silent, unnoticed, closing time never announced, playing for nothing but the score itself, the row of numbers, a chance of entering her initials among those of other strangers for a brief time, no longer the time the world observed but game time, underground time, time that could take her nowhere outside its own tight and falsely deathless perimeter."
